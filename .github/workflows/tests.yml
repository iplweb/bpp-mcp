name: tests

on:
  push:
    branches: [main]
  pull_request:
  # Wywoływalny z `release.yml` — wydanie przepuszcza dokładnie tę samą matrycę,
  # zamiast utrzymywać jej kopię.
  workflow_call:

# Minimalne uprawnienia GITHUB_TOKEN — workflow tylko czyta kod.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Zainstaluj uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Zsynchronizuj zależności (z extra dev)
        run: uv sync --extra dev

      - name: Ruff format --check
        run: uv run ruff format --check .

      - name: Ruff check
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
